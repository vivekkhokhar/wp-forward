<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WhatsApp Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="side-head">
        <input id="search" type="search" placeholder="Search chats…" />
        <button id="refresh" title="Reload chats">⟳</button>
        <a href="/contacts.html" title="Edit contacts" style="display:flex;align-items:center;text-decoration:none;background:#f0f2f5;border-radius:8px;padding:0 12px;font-size:16px;">👤</a>
        <a href="/faces.html" title="Enroll faces" style="display:flex;align-items:center;text-decoration:none;background:#f0f2f5;border-radius:8px;padding:0 12px;font-size:16px;">😀</a>
        <a href="/merge.html" title="Merge contacts" style="display:flex;align-items:center;text-decoration:none;background:#f0f2f5;border-radius:8px;padding:0 12px;font-size:16px;">🔀</a>
      </header>
      <div id="chats" class="chats"></div>
    </aside>
    <main id="main">
      <header id="convo-head">
        <div class="convo-meta"><span id="convo-title">Select a chat</span><span id="convo-sub"></span></div>
        <label id="live-toggle"><input type="checkbox" id="live" /><span>🟢 Live</span></label>
      </header>
      <div id="messages" class="messages"><div class="empty">Pick a chat on the left.</div></div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
